<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký tài khoản - GreenMart</title>
<link rel="icon" href="assets/images/logo/favicon.png">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/account.css">
</head>
<body class="trang-dang-ky">

<div class="man-hinh-tai-khoan">
  <!-- ============ CỘT ẢNH BÊN TRÁI ============ -->
  <div class="tai-khoan-anh">
    <div class="khung-anh">
      <img src="assets/images/banner/banner-dang-ky.jpg" alt="Cửa hàng GreenMart" onerror="this.src='assets/images/placeholder.svg'">
    </div>
    <div class="tai-khoan-anh-noi-dung">
      <a href="index.html" class="tai-khoan-logo-noi">
        <img src="assets/icons/leaf.svg" alt="" class="icon-svg">
        GreenMart
      </a>
    </div>
    <div class="tai-khoan-anh-duoi">
      <h2>Hành trình mang nông sản sạch từ nông trại đến gian bếp gia đình bạn.</h2>
      <div class="khach-hang-tin-dung">
        <div class="avatar-chong">
          <img src="assets/images/avatar/khach-hang-1.jpg" alt="Khách hàng" onerror="this.src='assets/images/placeholder.svg'">
          <img src="assets/images/avatar/khach-hang-2.jpg" alt="Khách hàng" onerror="this.src='assets/images/placeholder.svg'">
        </div>
        <span>+10.000 khách hàng tin dùng</span>
      </div>
    </div>
  </div>

  <!-- ============ CỘT FORM BÊN PHẢI ============ -->
  <div class="tai-khoan-form-vung">
    <div class="tai-khoan-form">
      <h1>Tạo tài khoản mới</h1>
      <p>Chào mừng bạn gia nhập cộng đồng sống khỏe GreenMart.</p>

      <div class="hop-canh-bao loi mb-24" id="canh-bao-dang-ky" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
        <span id="noi-dung-canh-bao-dk">Vui lòng kiểm tra lại thông tin đã nhập</span>
      </div>

      <form id="form-dang-ky" novalidate>
        <div class="nhom-truong">
          <label for="dk-ho-ten">Họ và tên</label>
          <input type="text" id="dk-ho-ten" class="o-nhap" placeholder="Nguyễn Văn A" required>
        </div>

        <div class="nhom-truong">
          <label for="dk-email">Email</label>
          <input type="email" id="dk-email" class="o-nhap" placeholder="example@email.com" required>
        </div>

        <div class="nhom-truong">
          <label for="dk-so-dien-thoai">Số điện thoại</label>
          <input type="tel" id="dk-so-dien-thoai" class="o-nhap" placeholder="09xx xxx xxx" required>
        </div>

        <div class="nhom-truong">
          <label for="dk-mat-khau">Mật khẩu</label>
          <div class="o-nhap-co-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            <input type="password" id="dk-mat-khau" class="o-nhap" placeholder="Tối thiểu 8 ký tự" required minlength="8">
            <button type="button" class="nut-hien-mat-khau" data-cho="dk-mat-khau" aria-label="Hiện mật khẩu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="dieu-kien-mat-khau">
            <label class="o-radio"><input type="radio" id="dk-du-8-ky-tu"><span>8+ ký tự</span></label>
            <label class="o-radio"><input type="radio" id="dk-hoa-thuong"><span>Hoa & thường</span></label>
            <label class="o-radio"><input type="radio" id="dk-co-chu-so"><span>Có chữ số</span></label>
          </div>
        </div>

        <div class="nhom-truong">
          <label for="dk-xac-nhan-mat-khau">Xác nhận mật khẩu</label>
          <input type="password" id="dk-xac-nhan-mat-khau" class="o-nhap" placeholder="Nhập lại mật khẩu" required>
        </div>

        <label class="o-dong-y-dieu-khoan">
          <input type="checkbox" id="dk-dong-y" required>
          <span>Tôi đồng ý với các <a href="javascript:void(0)" class="disabled-link" aria-disabled="true" tabindex="-1">Điều khoản sử dụng</a> và <a href="javascript:void(0)" class="disabled-link" aria-disabled="true" tabindex="-1">Chính sách bảo mật</a> của GreenMart.</span>
        </label>

        <button type="submit" class="nut nut-cam nut-rong">
          Tạo tài khoản
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </form>

      <p class="chuyen-huong-tai-khoan">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>

      <div class="tai-khoan-form-chan">
        <a href="javascript:void(0)" class="disabled-link" aria-disabled="true" tabindex="-1">Về chúng tôi</a>
        <a href="#">Trợ giúp</a>
        <a href="#">Tiếng Việt (VN)</a>
      </div>
    </div>
  </div>
</div>

    <script src="js/common.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
